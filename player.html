<!-- player.html hosted at e.g. https://yourname.github.io/yt-relay/player.html -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body style="margin:0">
  <div id="player"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const videos = JSON.parse(params.get("videos") || "[]");
    const muted = params.get("muted") === "true";

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: videos[0],
        playerVars: { autoplay: 1, mute: muted ? 1 : 0, playsinline: 1,
                      origin: location.origin }, // real origin — key part
        events: {
          onReady: e => e.target.playVideo(),
          onStateChange: e => {
            if (e.data === YT.PlayerState.ENDED) {
              const next = (videos.indexOf(player.getVideoData().video_id) + 1) % videos.length;
              player.loadVideoById(videos[next]);
            }
          }
        }
      });
    }
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
